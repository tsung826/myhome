            .tab-content { display: block !important; }

<body class="pb-24">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div class="flex-1">
            <div id="header-trip-name" class="text-xl font-bold truncate">日本東北自由行</div>
            <div id="header-trip-dest" class="text-xs opacity-80 truncate">📍 東京 | 2026-01-14 〜 2026-01-18</div>
        </div>
        <div class="flex gap-2 no-print">
            <button id="btn-mode" onclick="toggleEditMode()" class="bg-white text-indigo-600 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 transition-all active:scale-95 bg-orange-100 text-orange-600"><i class="fas fa-unlock"></i> <span>閱讀模式</span></button>
            <button onclick="exportFullHTML()" class="bg-indigo-800 text-white px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 transition-all active:scale-95">
                <i class="fas fa-save"></i> <span class="hidden sm:inline">儲存最新版檔案</span>
            </button>
        </div>
    </header>

    <!-- Main Area -->
    <main class="p-4 max-w-md mx-auto">
        
        <!-- 1. Overview -->
        <div id="tab-overview" class="tab-content animate-fade-in active">
            <div class="bg-white rounded-2xl p-6 shadow-sm mb-6 border-t-4 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                    <i class="fas fa-info-circle text-indigo-500"></i> 旅程概況
                </h2>
                <div class="space-y-3 text-sm" id="overview-editor">
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">目的地</span>
                        <input class="edit-input text-right" value="東京" onchange="updateData('overview', null, 'destination', this.value)">
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">出發日期</span>
                        <input class="edit-input text-right" value="2026-01-20" onchange="updateData('overview', null, 'startDate', this.value)">
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">回程日期</span>
                        <input class="edit-input text-right" value="2026-01-24" onchange="updateData('overview', null, 'endDate', this.value)">
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">旅伴</span>
                        <input class="edit-input text-right" value="全家" onchange="updateData('overview', null, 'companions', this.value)">
                    </div>
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">狀態</span>
                        <input class="edit-input text-right" value="籌備中" onchange="updateData('overview', null, 'status', this.value)">
                    </div></div>
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-indigo-700 text-sm italic mb-6">
                💡 提示：點選閱讀或編輯模式，編輯完成後，會自動儲存，並可點擊右上角「儲存最新版檔案」。
            </div>
        </div>

        <!-- 2. Itinerary -->
        <div id="tab-itinerary" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-calendar-day text-indigo-500"></i> 每日詳細行程
                </h2>
                <button onclick="addItem('itinerary')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 行程</button>
            </div>
            <div id="itinerary-list" class="space-y-6"><div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-600 flex items-center gap-2"><i class="far fa-calendar"></i> <input class="edit-input w-32" value="2026-01-20" onchange="updateDate('2026-01-20', this.value)"></h3>
                    </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-indigo-400 flex items-start gap-3 relative">
                            <input type="checkbox" class="mt-1.5 w-4 h-4 rounded" onchange="updateData('itinerary', 0, 'done', this.checked)">
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <input class="edit-input w-20 text-xs" value="12:00" onchange="updateData('itinerary', 0, 'time', this.value)">
                                    <input class="edit-input w-16 text-xs" value="住宿" onchange="updateData('itinerary', 0, 'category', this.value)">
                                </div>
                                <input class="edit-input font-bold mb-1" value="抵達飯店 Check-in" onchange="updateData('itinerary', 0, 'activity', this.value)">
                                <div class="text-xs text-gray-500 flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt"></i> <input class="edit-input" value="新宿飯店" onchange="updateData('itinerary', 0, 'location', this.value)">
                                </div>
                                <div class="text-xs text-gray-400 mt-2 italic"><input class="edit-input" value="寄放行李" onchange="updateData('itinerary', 0, 'notes', this.value)"></div>
                            </div>
                            <button onclick="deleteItem('itinerary', 0)" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-indigo-400 flex items-start gap-3 relative">
                            <input type="checkbox" class="mt-1.5 w-4 h-4 rounded" onchange="updateData('itinerary', 1, 'done', this.checked)">
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <input class="edit-input w-20 text-xs" value="14:00" onchange="updateData('itinerary', 1, 'time', this.value)">
                                    <input class="edit-input w-16 text-xs" value="景點" onchange="updateData('itinerary', 1, 'category', this.value)">
                                </div>
                                <input class="edit-input font-bold mb-1" value="淺草寺參拜" onchange="updateData('itinerary', 1, 'activity', this.value)">
                                <div class="text-xs text-gray-500 flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt"></i> <input class="edit-input" value="淺草" onchange="updateData('itinerary', 1, 'location', this.value)">
                                </div>
                                <div class="text-xs text-gray-400 mt-2 italic"><input class="edit-input" value="拍雷門大燈籠" onchange="updateData('itinerary', 1, 'notes', this.value)"></div>
                            </div>
                            <button onclick="deleteItem('itinerary', 1)" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-indigo-400 flex items-start gap-3 relative">
                            <input type="checkbox" class="mt-1.5 w-4 h-4 rounded" onchange="updateData('itinerary', 2, 'done', this.checked)">
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <input class="edit-input w-20 text-xs" value="18:00" onchange="updateData('itinerary', 2, 'time', this.value)">
                                    <input class="edit-input w-16 text-xs" value="美食" onchange="updateData('itinerary', 2, 'category', this.value)">
                                </div>
                                <input class="edit-input font-bold mb-1" value="晚餐-敘敘苑" onchange="updateData('itinerary', 2, 'activity', this.value)">
                                <div class="text-xs text-gray-500 flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt"></i> <input class="edit-input" value="新宿店" onchange="updateData('itinerary', 2, 'location', this.value)">
                                </div>
                                <div class="text-xs text-gray-400 mt-2 italic"><input class="edit-input" value="已預約 18:00" onchange="updateData('itinerary', 2, 'notes', this.value)"></div>
                            </div>
                            <button onclick="deleteItem('itinerary', 2)" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>

            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));

            if (section === 'overview') {

            updateHeader();
        }

            if(!confirm('確定要刪除此項目嗎？')) return;
            tripData[section].splice(index, 1);
            localStorage.setItem('trip_data_v2', JSON.stringify(tripData));
            renderAll();
        }

                'packing': { section: 'packingList', newItem: {item: "物品", category: "雜項", priority: "建議", qty: 1, notes: "", packed: false} },
                'budget': { section: 'budget', newItem: {date: "", item: "支出", category: "其他", est: 0, actual: 0, currency: "TWD", method: "現金", notes: ""} },

            tripData[target.section].push(target.newItem);

            renderAll();

        function updateDate(oldDate, newDate) {

        }

        function exportFullHTML() {
            const currentHTML = document.documentElement.outerHTML;
            const dataScript = `<script>
                const DEFAULT_DATA = ${JSON.stringify(tripData, null, 2)};
                localStorage.setItem('trip_data_v2', JSON.stringify(DEFAULT_DATA));
            <\/script>`;
            
            // This is a simplified approach. To truly embed data, we need to replace the DEFAULT_DATA object in the script.
            // For this demo, the easiest way is to save the HTML but the user's data stays in the LocalStorage of the new file.
            // Better: Create a blob with the modified script.
            
            let finalHTML = currentHTML;
            const dataRegex = /const DEFAULT_DATA = \{[\s\S]*?\};/;
            finalHTML = finalHTML.replace(dataRegex, `const DEFAULT_DATA = ${JSON.stringify(tripData, null, 2)};`);

            const blob = new Blob([finalHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `日本東北自由行_${new Date().toISOString().split('T')[0]}.html`;
            a.click();
        }

        window.onload = () => {
            updateHeader();
            renderAll();
