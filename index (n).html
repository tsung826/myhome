<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本東北之行 - 視覺化編輯版 (支持縮放)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* 針對手機端輸入框-防止 iOS 自動強行放大，將字體設為 16px */
        .edit-input { 
            border: 1px solid #d1d5db; 
            padding: 4px 6px; 
            border-radius: 4px; 
            background: #fff; 
            width: 100%; 
            font-size: 16px !important; 
        }
        @media print {
            .no-print { display: none !important; }
            .tab-content { display: block !important; }
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div class="flex-1">
            <div id="header-trip-name" class="text-xl font-bold truncate">日本東北之行</div>
            <div id="header-trip-dest" class="text-xs opacity-80 truncate">📍 東京 | 2026-01-20 〜 01-24</div>
        </div>
        <div class="flex gap-2 no-print">
            <button id="btn-mode" onclick="toggleEditMode()" class="bg-white text-indigo-600 px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 transition-all active:scale-95">
                <i class="fas fa-lock"></i> <span>編輯模式</span>
            </button>
            <button onclick="exportFullHTML()" class="bg-indigo-800 text-white px-3 py-1 rounded-full text-sm font-bold flex items-center gap-1 transition-all active:scale-95">
                <i class="fas fa-save"></i> <span class="hidden sm:inline">儲存永久檔</span>
            </button>
        </div>
    </header>

    <!-- Main Area -->
    <main class="p-4 max-w-md mx-auto">
        
        <!-- 1. Overview -->
        <div id="tab-overview" class="tab-content active animate-fade-in">
            <div class="bg-white rounded-2xl p-6 shadow-sm mb-6 border-t-4 border-indigo-500">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                    <i class="fas fa-info-circle text-indigo-500"></i> 旅程概況
                </h2>
                <div class="space-y-3 text-sm" id="overview-editor">
                    <!-- JS Render -->
                </div
            </div>
            <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 text-indigo-700 text-sm italic mb-6">
                💡 提示：您現在可以使用雙指捏合來放大畫面，方便查看詳細內容。
            </div>
        </div>

        <!-- 2. Itinerary -->
        <div id="tab-itinerary" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-calendar-day text-indigo-500"></i> 每日詳細行程
                </h2>
                <button onclick="addItem('itinerary')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 行程</button>
            </div>
            <div id="itinerary-list" class="space-y-6"></div>
        </div>

        <!-- 3. Transport -->
        <div id="tab-transport" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-plane-departure text-indigo-500"></i> 交通與住宿
                </h2>
                <button onclick="addItem('transport')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 交通</button>
            </div>
            <div id="transport-list" class="space-y-3"></div>
        </div>

        <!-- 4. Food -->
        <div id="tab-food" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-utensils text-indigo-500"></i> 餐廳預約
                </h2>
                <button onclick="addItem('food')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 餐廳</button>
            </div>
            <div id="food-list" class="space-y-3"></div>
        </div>

        <!-- 5. Packing -->
        <div id="tab-packing" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-suitcase text-indigo-500"></i> 行李檢查清單
                </h2>
                <button onclick="addItem('packing')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 物品</button>
            </div>
            <div id="packing-list" class="bg-white rounded-2xl shadow-sm overflow-hidden"></div>
        </div>

        <!-- 6. Budget -->
        <div id="tab-budget" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-wallet text-indigo-500"></i> 預算追蹤
                </h2>
                <button onclick="addItem('budget')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 支出</button>
            </div>
            <div id="budget-list" class="space-y-3"></div>
        </div>

        <!-- 7. Contacts -->
        <div id="tab-contacts" class="tab-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fas fa-address-book text-indigo-500"></i> 緊急聯絡資訊
                </h2>
                <button onclick="addItem('contact')" class="no-print bg-indigo-100 text-indigo-600 px-2 py-1 rounded text-xs font-bold">+ 聯絡人</button>
            </div>
            <div id="contacts-list" class="space-y-3"></div>
        </div>

    </main>

    <!-- Navigation -->
    <nav class="no-print fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center py-2 safe-bottom shadow-lg z-50">
        <button onclick="switchTab('overview', this)" class="nav-item flex flex-col items-center text-indigo-600">
            <i class="fas fa-home text-xl"></i><span class="text-[10px] mt-1">總覽</span>
        </button>
        <button onclick="switchTab('itinerary', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-calendar-alt text-xl"></i><span class="text-[10px] mt-1">行程</span>
        </button>
        <button onclick="switchTab('transport', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-hotel text-xl"></i><span class="text-[10px] mt-1">交通</span>
        </button>
        <button onclick="switchTab('food', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-utensils text-xl"></i><span class="text-[10px] mt-1">美食</span>
        </button>
        <button onclick="switchTab('packing', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-check-square text-xl"></i><span class="text-[10px] mt-1">清單</span>
        </button>
        <button onclick="switchTab('budget', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-coins text-xl"></i><span class="text-[10px] mt-1">預算</span>
        </button>
        <button onclick="switchTab('contacts', this)" class="nav-item flex flex-col items-center text-gray-400">
            <i class="fas fa-phone text-xl"></i><span class="text-[10px] mt-1">聯絡</span>
        </button>
    </nav>

    <script>
        // --- Initial Data ---
        const DEFAULT_DATA = {
            overview: {
                tripName: "日本東北之行",
                destination: "東京",
                startDate: "2026-01-20",
                endDate: "2026-01-24",
                companions: "全家",
                status: "籌備中"
            },
            transport_stay: [
                {category: "機票", item: "長榮航空 BR123", conf: "ABC12345", date: "2026-01-20 08:00", location: "桃園機場 T1", phone: "0800-xxx", notes: "記得提前3小時到達"},
                {category: "飯店", item: "銀山溫泉能登屋", conf: "CONF9876", date: "01/14-01/18", location: "東京都新宿區...", phone: "N/A", notes: "含早餐, 需出示護照"},
                {category: "租車", item: "Toyota Rent", conf: "REN7788", date: "2026-01-21 10:00", location: "成田機場櫃檯", phone: "N/A", notes: "需國際駕照"}
            ],
            itinerary: [
                {date: "2026-01-20", time: "12:00", activity: "抵達飯店 Check-in", location: "新宿飯店", category: "住宿", notes: "寄放行李", done: false},
                {date: "2026-01-20", time: "14:00", activity: "淺草寺參拜", location: "淺草", category: "景點", notes: "拍雷門大燈籠", done: false},
                {date: "2026-01-20", time: "18:00", activity: "晚餐-敘敘苑", location: "新宿店", category: "美食", notes: "已預約 18:00", done: false}
            ],
            restaurants: [
                {name: "敘敘苑", date: "2026-01-20", time: "18:00", pax: 4, conf: "Order_SXY123", mustOrder: "頂級特選牛", status: "已確認"},
                {name: "築地壽司", date: "2026-01-22", time: "11:30", pax: 4, conf: "Name: Zhang", mustOrder: "職人特選握壽司", status: "待定"}
            ],
            packingList: [
                {item: "護照", category: "證件", priority: "必備", qty: 1, notes: "檢查有效期", packed: false},
                {item: "行電轉接頭", category: "電子", priority: "必備", qty: 2, notes: "適用於日本", packed: false},
                {item: "綜合感冒藥", category: "藥品", priority: "建議", qty: 1, notes: "備用", packed: false}
            ],
            budget: [
                {date: "2026-01-20", item: "機票", category: "交通", est: 15000, actual: 14500, currency: "TWD", method: "信用卡", notes: "早鳥優惠"},
                {date: "2026-01-20", item: "晚餐", category: "食宿", est: 3000, actual: 3200, currency: "JPY", method: "現金", notes: "包含飲料"}
            ],
            contacts: [
                {item: "駐外使館", name: "台灣駐日代表處", phone: "N/A", relation: "政府機關", notes: "護照遺失報案"},
                {item: "緊急聯絡人", name: "王先生", phone: "09xx-xxx-xxx", relation: "家屬", notes: "備用聯絡人"},
                {item: "保險公司", name: "XX 旅平險", phone: "0800-xxx", relation: "保險代理", notes: "單號：POL12345"}
            ]
        };

        let tripData = JSON.parse(localStorage.getItem('trip_data_v2')) || DEFAULT_DATA;
        let isEditMode = false;

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('btn-mode');
            btn.innerHTML = isEditMode ? `<i class="fas fa-unlock"></i> <span>閱讀模式</span>` : `<i class="fas fa-lock"></i> <span>編輯模式</span>`;
            btn.classList.toggle('bg-orange-100');
            btn.classList.toggle('text-orange-600');
            renderAll();
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.replace('text-indigo-600', 'text-gray-400'));
            el.classList.replace('text-gray-400', 'text-indigo-600');
            window.scrollTo(0, 0);
        }

        function updateData(section, index, key, value) {
            if (section === 'overview') {
                tripData.overview[key] = value;
            } else {
                tripData[section][index][key] = value;
            }
            localStorage.setItem('trip_data_v2', JSON.stringify(tripData));
            updateHeader();
        }

        function updateHeader() {
            document.getElementById('header-trip-name').innerText = tripData.overview.tripName;
            document.getElementById('header-trip-dest').innerText = `📍 ${tripData.overview.destination} | ${tripData.overview.startDate} 〜 ${tripData.overview.endDate}`;
        }

        function deleteItem(section, index) {
            if(!confirm('確定要刪除此項目嗎？')) return;
            tripData[section].splice(index, 1);
            localStorage.setItem('trip_data_v2', JSON.stringify(tripData));
            renderAll();
        }

        function addItem(type) {
            const map = {
                'itinerary': { section: 'itinerary', newItem: {date: "", time: "12:00", activity: "新活動", location: "", category: "景點", notes: "", done: false} },
                'transport': { section: 'transport_stay', newItem: {category: "飯店", item: "名稱", conf: "", date: "", location: "", phone: "", notes: ""} },
                'food': { section: 'restaurants', newItem: {name: "餐廳", date: "", time: "12:00", pax: 4, conf: "", mustOrder: "", status: "待定"} },
                'packing': { section: 'packingList', newItem: {item: "物品", category: "雜項", priority: "建議", qty: 1, notes: "", packed: false} },
                'budget': { section: 'budget', newItem: {date: "", item: "支出", category: "其他", est: 0, actual: 0, currency: "TWD", method: "現金", notes: ""} },
                'contact': { section: 'contacts', newItem: {item: "項目", name: "姓名", phone: "", relation: "", notes: ""} }
            };
            const target = map[type];
            tripData[target.section].push(target.newItem);
            localStorage.setItem('trip_data_v2', JSON.stringify(tripData));
            renderAll();
        }

        function renderAll() {
            updateHeader();
            
            // Overview
            const ovDiv = document.getElementById('overview-editor');
            ovDiv.innerHTML = '';
            const fields = [
                { key: 'destination', label: '目的地' },
                { key: 'startDate', label: '出發日期' },
                { key: 'endDate', label: '回程日期' },
                { key: 'companions', label: '旅伴' },
                { key: 'status', label: '狀態' }
            ];
            fields.forEach(f => {
                const val = tripData.overview[f.key];
                ovDiv.innerHTML += `
                    <div class="flex justify-between border-b pb-2">
                        <span class="text-gray-500">${f.label}</span>
                        ${isEditMode ? `<input class="edit-input text-right" value="${val}" onchange="updateData('overview', null, '${f.key}', this.value)">` : `<span class="font-medium text-gray-800">${val}</span>`}
                    </div>`;
            });

            // Itinerary
            const itiList = document.getElementById('itinerary-list');
            itiList.innerHTML = '';
            const dates = [...new Set(tripData.itinerary.map(i => i.date))];
            dates.forEach(date => {
                const dayDiv = document.createElement('div');
                dayDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-gray-600 flex items-center gap-2"><i class="far fa-calendar"></i> ${isEditMode ? `<input class="edit-input w-32" value="${date}" onchange="updateDate('${date}', this.value)">` : date}</h3>
                    </div>`;
                tripData.itinerary.filter(i => i.date === date).forEach((item, idx) => {
                    const realIdx = tripData.itinerary.indexOf(item);
                    dayDiv.innerHTML += `
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-3 border-l-4 border-indigo-400 flex items-start gap-3 relative">
                            <input type="checkbox" class="mt-1.5 w-4 h-4 rounded" ${item.done ? 'checked' : ''} onchange="updateData('itinerary', ${realIdx}, 'done', this.checked)">
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    ${isEditMode ? `<input class="edit-input w-20 text-xs" value="${item.time}" onchange="updateData('itinerary', ${realIdx}, 'time', this.value)">` : `<span class="text-xs font-bold text-indigo-500">${item.time}</span>`}
                                    ${isEditMode ? `<input class="edit-input w-16 text-xs" value="${item.category}" onchange="updateData('itinerary', ${realIdx}, 'category', this.value)">` : `<span class="text-[10px] px-1.5 py-0.5 bg-gray-100 rounded text-gray-500">${item.category}</span>`}
                                </div>
                                ${isEditMode ? `<input class="edit-input font-bold mb-1" value="${item.activity}" onchange="updateData('itinerary', ${realIdx}, 'activity', this.value)">` : `<div class="font-bold text-gray-800">${item.activity}</div>`}
                                <div class="text-xs text-gray-500 flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt"></i> ${isEditMode ? `<input class="edit-input" value="${item.location}" onchange="updateData('itinerary', ${realIdx}, 'location', this.value)">` : item.location}
                                </div>
                                <div class="text-xs text-gray-400 mt-2 italic">${isEditMode ? `<input class="edit-input" value="${item.notes}" onchange="updateData('itinerary', ${realIdx}, 'notes', this.value)">` : item.notes}</div>
                            </div>
                            ${isEditMode ? `<button onclick="deleteItem('itinerary', ${realIdx})" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                        </div>`;
                });
                itiList.appendChild(dayDiv);
            });

            // Transport
            const transList = document.getElementById('transport-list');
            transList.innerHTML = '';
            tripData.transport_stay.forEach((item, idx) => {
                transList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative">
                        <div class="flex justify-between items-start mb-2">
                            ${isEditMode ? `<input class="edit-input w-20 text-[10px] font-bold" value="${item.category}" onchange="updateData('transport_stay', ${idx}, 'category', this.value)">` : `<span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-100 text-indigo-600 rounded-full uppercase">${item.category}</span>`}
                            ${isEditMode ? `<input class="edit-input w-24 text-xs" value="${item.date}" onchange="updateData('transport_stay', ${idx}, 'date', this.value)">` : `<span class="text-xs text-gray-400">${item.date}</span>`}
                        </div>
                        ${isEditMode ? `<input class="edit-input font-bold mb-1" value="${item.item}" onchange="updateData('transport_stay', ${idx}, 'item', this.value)">` : `<div class="font-bold text-gray-800">${item.item}</div>`}
                        <div class="text-xs text-gray-500 mt-1 italic">${isEditMode ? `<input class="edit-input" value="${item.conf}" onchange="updateData('transport_stay', ${idx}, 'conf', this.value)">` : `編號: ${item.conf}`}</div>
                        <div class="text-sm text-gray-600 mt-2"><i class="fas fa-map-pin mr-1 text-gray-400"></i> ${isEditMode ? `<input class="edit-input" value="${item.location}" onchange="updateData('transport_stay', ${idx}, 'location', this.value)">` : item.location}</div>
                        ${isEditMode ? `<input class="edit-input text-xs text-gray-400 mt-1" value="${item.notes}" onchange="updateData('transport_stay', ${idx}, 'notes', this.value)">` : `<div class="text-xs text-gray-400 mt-1 italic">備註: ${item.notes}</div>`}
                        ${isEditMode ? `<button onclick="deleteItem('transport_stay', ${idx})" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
            });

            // Food
            const foodList = document.getElementById('food-list');
            foodList.innerHTML = '';
            tripData.restaurants.forEach((item, idx) => {
                foodList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-400 relative">
                        <div class="flex justify-between items-center mb-2">
                            ${isEditMode ? `<input class="edit-input font-bold" value="${item.name}" onchange="updateData('restaurants', ${idx}, 'name', this.value)">` : `<div class="font-bold text-gray-800">${item.name}</div>`}
                            ${isEditMode ? `<input class="edit-input text-[10px] w-20" value="${item.status}" onchange="updateData('restaurants', ${idx}, 'status', this.value)">` : `<span class="text-[10px] px-1.5 py-0.5 ${item.status === '已確認' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'} rounded font-bold">${item.status}</span>`}
                        </div>
                        <div class="text-xs text-gray-500 space-y-1">
                            <div>📅 ${isEditMode ? `<input class="edit-input w-24 inline-block" value="${item.date}" onchange="updateData('restaurants', ${idx}, 'date', this.value)">` : item.date} ${isEditMode ? `<input class="edit-input w-16 inline-block" value="${item.time}" onchange="updateData('restaurants', ${idx}, 'time', this.value)">` : item.time} | 👥 ${isEditMode ? `<input class="edit-input w-12 inline-block" value="${item.pax}" onchange="updateData('restaurants', ${idx}, 'pax', this.value)">` : item.pax}人</div>
                            <div class="text-orange-600 font-medium">✨ 必點: ${isEditMode ? `<input class="edit-input" value="${item.mustOrder}" onchange="updateData('restaurants', ${idx}, 'mustOrder', this.value)">` : item.mustOrder}</div>
                            <div class="text-gray-400 italic font-light">確認碼: ${isEditMode ? `<input class="edit-input" value="${item.conf}" onchange="updateData('restaurants', ${idx}, 'conf', this.value)">` : item.conf}</div>
                        </div>
                        ${isEditMode ? `<button onclick="deleteItem('restaurants', ${idx})" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
            });

            // Packing
            const packList = document.getElementById('packing-list');
            packList.innerHTML = '';
            tripData.packingList.forEach((item, idx) => {
                packList.innerHTML += `
                    <div class="flex items-center p-4 border-b last:border-b-0 hover:bg-gray-50 transition-colors cursor-pointer relative">
                        <input type="checkbox" class="w-5 h-5 rounded text-indigo-600 accent-indigo-600" ${item.packed ? 'checked' : ''} onchange="updateData('packingList', ${idx}, 'packed', this.checked)">
                        <div class="ml-3 flex-1">
                            ${isEditMode ? `<input class="edit-input text-sm font-medium mb-1" value="${item.item}" onchange="updateData('packingList', ${idx}, 'item', this.value)">` : `<div class="text-sm font-medium text-gray-800">${item.item} <span class="text-xs text-gray-400">x${item.qty}</span></div>`}
                            ${isEditMode ? `<div class="flex gap-1"><input class="edit-input text-[10px] w-16" value="${item.category}" onchange="updateData('packingList', ${idx}, 'category', this.value)"> <input class="edit-input text-[10px] w-16" value="${item.priority}" onchange="updateData('packingList', ${idx}, 'priority', this.value)"></div>` : `<div class="text-[10px] text-gray-400">${item.category} | ${item.priority}</div>`}
                        </div >
                        ${isEditMode ? `<button onclick="deleteItem('packingList', ${idx})" class="text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
            });

            // Budget
            const budList = document.getElementById('budget-list');
            budList.innerHTML = '';
            tripData.budget.forEach((item, idx) => {
                budList.innerHTML += `
                    <div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center relative">
                        <div class="text-sm flex-1">
                            ${isEditMode ? `<input class="edit-input font-bold mb-1" value="${item.item}" onchange="updateData('budget', ${idx}, 'item', this.value)">` : `<div class="font-bold text-gray-800">${item.item}</div>`}
                            ${isEditMode ? `<div class="flex gap-1"><input class="edit-input text-[10px] w-16" value="${item.category}" onchange="updateData('budget', ${idx}, 'category', this.value)"> <input class="edit-input text-[10px] w-16" value="${item.method}" onchange="updateData('budget', ${idx}, 'method', this.value)"></div>` : `<div class="text-[10px] text-gray-400">${item.category} | ${item.method}</div>`}
                        </div>
                        <div class="text-right ml-2">
                            ${isEditMode ? `<div class="flex items-center justify-end gap-1"><input class="edit-input w-16 text-right text-sm font-bold" value="${item.actual}" onchange="updateData('budget', ${idx}, 'actual', this.value)"> <input class="edit-input w-12 text-xs" value="${item.currency}" onchange="updateData('budget', ${idx}, 'currency', this.value)"></div>` : `<div class="text-sm font-bold text-gray-800">${item.actual} <span class="text-[10px]">${item.currency}</span></div>`}
                            ${isEditMode ? `<input class="edit-input w-16 text-right text-[10px] text-gray-400" value="${item.est}" onchange="updateData('budget', ${idx}, 'est', this.value)">` : `<div class="text-[10px] text-gray-400 line-through">預算 ${item.est}</div>`}
                        </div>
                        ${isEditMode ? `<button onclick="deleteItem('budget', ${idx})" class="absolute -right-2 top-1/2 -translate-y-1/2 text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
            });

            // Contacts
            const conList = document.getElementById('contacts-list');
            conList.innerHTML = '';
            tripData.contacts.forEach((item, idx) => {
                conList.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm relative">
                        ${isEditMode ? `<input class="edit-input font-bold mb-1" value="${item.name}" onchange="updateData('contacts', ${idx}, 'name', this.value)">` : `<div class="font-bold text-gray-800">${item.name}</div>`}
                        ${isEditMode ? `<input class="edit-input text-xs text-gray-500 mb-2" value="${item.item} | ${item.relation}" onchange="updateData('contacts', ${idx}, 'item', this.value)">` : `<div class="text-xs text-gray-500 mb-2">${item.item} | ${item.relation}</div>`}
                        ${isEditMode ? `<input class="edit-input w-full text-center bg-indigo-50 text-indigo-600 font-bold py-2" value="${item.phone}" onchange="updateData('contacts', ${idx}, 'phone', this.value)">` : `<a href="tel:${item.phone}" class="flex items-center justify-center gap-2 bg-indigo-50 text-indigo-600 py-2 rounded-lg text-sm font-bold"><i class="fas fa-phone"></i> ${item.phone}</a>`}
                        ${isEditMode ? `<input class="edit-input text-[10px] text-gray-400 mt-2 italic" value="${item.notes}" onchange="updateData('contacts', ${idx}, 'notes', this.value)">` : `<div class="text-[10px] text-gray-400 mt-2 italic">備註: ${item.notes}</div>`}
                        ${isEditMode ? `<button onclick="deleteItem('contacts', ${idx})" class="absolute top-2 right-2 text-red-400 p-2"><i class="fas fa-trash"></i></button>` : ''}
                    </div>`;
            });
        }

        function updateDate(oldDate, newDate) {
            tripData.itinerary.forEach(i => { if(i.date === oldDate) i.date = newDate; });
            localStorage.setItem('trip_data_v2', JSON.stringify(tripData));
            renderAll();
        }

        function exportFullHTML() {
            const currentHTML = document.documentElement.outerHTML;
            let finalHTML = currentHTML;
            const dataRegex = /const DEFAULT_DATA = \{[\s\S]*?\};/;
            finalHTML = finalHTML.replace(dataRegex, `const DEFAULT_DATA = ${JSON.stringify(tripData, null, 2)};`);
            const blob = new Blob([finalHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `日本東北之行_縮放版_${new Date().toISOString().split('T')[0]}.html`;
            a.click();
        }

        window.onload = () => {
            updateHeader();
            renderAll();
        };
    </script>
</body>
</html>
